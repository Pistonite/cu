name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          rust: stable
      - run: task check
  test-linux:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          rust: stable
      - run: task test
  test-windows:
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          rust: stable
      - run: task test
  doc:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: Pistonight/mono-dev/actions/setup@main
        with:
          rust: nightly
      - run: task doc-ci
